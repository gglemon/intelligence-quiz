<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trivia Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee+Outline&family=Bungee+Shade&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1226;
    --card: #1f2348;
    --card-2: #262b58;
    --accent: #f5c518;
    --accent-2: #ff5e7e;
    --good: #3fd17a;
    --bad: #ff5b5b;
    --easy: #3fd17a;
    --medium: #f5c518;
    --hard: #ff5e7e;
    --text: #f5f7ff;
    --muted: #a4abd0;
    --border: #2e3470;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: "Times New Roman", Times, serif;
    background: radial-gradient(1200px 600px at 10% -10%, #2a2160 0%, transparent 60%),
                radial-gradient(900px 500px at 100% 110%, #5b1d4d 0%, transparent 60%),
                var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 32px 20px 80px; }

  header { text-align: center; margin-bottom: 28px; }
  header h1 {
    margin: 0 0 6px;
    font-family: "Bungee Shade", "Times New Roman", serif;
    font-size: 44px;
    letter-spacing: 1px;
    line-height: 1.1;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header p { margin: 0; color: var(--muted); font-size: 16px; }
  h2, h3 { font-family: "Bungee Shade", "Times New Roman", serif; letter-spacing: 1px; }

  .step-label {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 8px 0 16px;
  }

  .pick-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }
  .pick-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 26px 20px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .pick-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .pick-card.easy:hover   { border-color: var(--easy); }
  .pick-card.medium:hover { border-color: var(--medium); }
  .pick-card.hard:hover   { border-color: var(--hard); }

  .pick-num {
    font-family: "Bungee Shade", "Times New Roman", serif;
    font-size: 56px;
    line-height: 1;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .pick-title {
    font-family: "Bungee Shade", "Times New Roman", serif;
    font-size: 28px;
    line-height: 1;
    letter-spacing: 1px;
  }
  .pick-title.easy   { color: var(--easy); }
  .pick-title.medium { color: var(--medium); }
  .pick-title.hard   { color: var(--hard); }

  .pick-label { color: var(--text); font-size: 16px; margin: 8px 0 4px; font-weight: 700; }
  .pick-desc  { color: var(--muted); font-size: 13px; }

  .selection-summary {
    text-align: center;
    color: var(--muted);
    margin: 20px 0 6px;
    font-size: 14px;
  }
  .selection-summary strong { color: var(--text); }

  /* Progress bar */
  .progress-bar {
    position: sticky; top: 0; z-index: 5;
    background: rgba(15, 18, 38, 0.85);
    backdrop-filter: blur(10px);
    padding: 10px 0; margin: 0 -20px 16px;
    padding-left: 20px; padding-right: 20px;
    border-bottom: 1px solid var(--border);
  }
  .progress-track { width: 100%; height: 8px; background: var(--card); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: 0%; transition: width 0.25s ease; }
  .progress-meta { display: flex; justify-content: space-between; margin-top: 6px; font-size: 13px; color: var(--muted); }

  /* Question card */
  .question {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    margin-bottom: 14px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
  }
  .q-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .q-num { color: var(--accent); font-weight: 700; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
  .q-pts { color: var(--muted); font-size: 12px; padding: 3px 10px; border-radius: 999px; background: var(--card-2); text-transform: uppercase; letter-spacing: 0.5px; }

  .q-text { font-size: 17px; line-height: 1.4; margin: 0 0 14px; }

  .options { display: grid; gap: 8px; }
  .option {
    display: flex; align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--card-2);
    border: 1px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    user-select: none;
  }
  .option:hover { background: #2f3568; }
  .option input { accent-color: var(--accent); }
  .option.selected { border-color: var(--accent); background: var(--card-2); }

  .actions { display: flex; justify-content: center; margin-top: 24px; gap: 12px; flex-wrap: wrap; }
  .btn {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: #1a1a1a;
    border: none;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 8px 24px rgba(245, 197, 24, 0.3);
    transition: transform 0.1s ease;
    font-family: "Times New Roman", Times, serif;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn.secondary { background: var(--card-2); color: var(--text); box-shadow: none; border: 1px solid var(--border); }

  /* Results */
  .result-card {
    background: linear-gradient(135deg, #2b2469 0%, #4a1d56 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    text-align: center;
    margin-bottom: 24px;
  }
  .score-ring {
    display: inline-block;
    font-family: "Bungee Shade", "Times New Roman", serif;
    font-size: 56px;
    line-height: 1.1;
    margin: 8px 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .score-ring small { font-size: 22px; color: var(--muted); -webkit-text-fill-color: var(--muted); font-family: "Times New Roman", Times, serif; }
  .breakdown {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .breakdown-item { text-align: center; }
  .breakdown-num {
    font-family: "Comic Sans MS", "Comic Sans", cursive;
    font-size: 30px;
    line-height: 1;
    font-weight: 700;
  }
  .breakdown-total {
    font-family: "Comic Sans MS", "Comic Sans", cursive;
    color: var(--muted);
    font-size: 22px;
    margin-left: 2px;
    font-weight: 700;
  }
  .breakdown-label {
    font-family: "Comic Sans MS", "Comic Sans", cursive;
    font-size: 15px;
    letter-spacing: 0.5px;
    margin-top: 8px;
  }
  .tier { font-family: "Bungee Shade", "Times New Roman", serif; font-size: 22px; margin: 8px 0 4px; letter-spacing: 1px; }
  .tier-blurb { color: var(--muted); margin: 0; }
  .pct { color: var(--muted); font-size: 14px; margin-top: 6px; }

  /* Review */
  .review-q {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--good);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 10px;
    font-size: 14.5px;
  }
  .review-q.wrong { border-left-color: var(--bad); }
  .review-q .label {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 4px;
  }
  .review-q .your { color: #ffd9d9; }
  .review-q .correct { color: #cdf3da; }
  .review-q.right .your { color: #cdf3da; }
  .badge { font-size: 12px; padding: 2px 8px; border-radius: 999px; margin-left: 8px; }
  .badge.right { background: rgba(63, 209, 122, 0.2); color: var(--good); }
  .badge.wrong { background: rgba(255, 91, 91, 0.2); color: var(--bad); }

  .empty-warning {
    background: rgba(255, 91, 91, 0.12);
    color: #ffb1b1;
    border: 1px solid rgba(255, 91, 91, 0.3);
    border-radius: 10px;
    padding: 10px 14px;
    margin: 12px 0;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>

    { difficulty: "hard", q: "Which African country was formerly known as Abyssinia?", options: ["Ethiopia", "Eritrea", "Somalia", "Sudan"], correctIndex: 0 },
    { difficulty: "hard", q: "Which is the only mammal capable of true, sustained flight?", options: ["Flying squirrel", "Bat", "Sugar glider", "Colugo"], correctIndex: 1 },
    { difficulty: "hard", q: "Who painted \"Guernica\"?", options: ["Salvador Dalí", "Pablo Picasso", "Joan Miró", "Francisco Goya"], correctIndex: 1 },
    { difficulty: "hard", q: "What is the world's longest above-water mountain range?", options: ["Himalayas", "Andes", "Rockies", "Atlas"], correctIndex: 1 },
    { difficulty: "hard", q: "What is the most abundant gas in Earth's atmosphere?", options: ["Oxygen", "Nitrogen", "Argon", "Carbon dioxide"], correctIndex: 1 },
    { difficulty: "hard", q: "The Magna Carta was signed in which year?", options: ["1066", "1215", "1297", "1485"], correctIndex: 1 },
    { difficulty: "hard", q: "Who painted \"American Gothic\"?", options: ["Edward Hopper", "Grant Wood", "Jackson Pollock", "Norman Rockwell"], correctIndex: 1 },
    { difficulty: "hard", q: "Who is widely credited with painting the first purely abstract painting?", options: ["Wassily Kandinsky", "Piet Mondrian", "Jackson Pollock", "Paul Klee"], correctIndex: 0 },
    { difficulty: "hard", q: "Who wrote \"Don Quixote\"?", options: ["Miguel de Cervantes", "Federico García Lorca", "Gabriel García Márquez", "Jorge Luis Borges"], correctIndex: 0 },
    { difficulty: "hard", q: "The Treaty of Versailles formally ended which war?", options: ["The Napoleonic Wars", "World War I", "World War II", "The Crimean War"], correctIndex: 1 },
    { difficulty: "hard", q: "What is the official currency of Vietnam?", options: ["Dong", "Kip", "Riel", "Baht"], correctIndex: 0 },
    { difficulty: "hard", q: "Which planet has the longest day (longest single rotation)?", options: ["Mercury", "Venus", "Mars", "Jupiter"], correctIndex: 1 },
    { difficulty: "hard", q: "Who composed the opera \"The Magic Flute\"?", options: ["Ludwig van Beethoven", "Wolfgang Amadeus Mozart", "Richard Wagner", "Giuseppe Verdi"], correctIndex: 1 },
    { difficulty: "hard", q: "Who painted \"Las Meninas\"?", options: ["Francisco Goya", "Diego Velázquez", "El Greco", "Bartolomé Esteban Murillo"], correctIndex: 1 },
    { difficulty: "hard", q: "Which is generally considered the rarest of the eight major ABO/Rh blood types?", options: ["O negative", "AB negative", "B negative", "A negative"], correctIndex: 1 },
  ];

  // ---- App state ----
  const SEEN_STORAGE_KEY = "trivia.seenIndices.v1";
  let chosenCount = null;
  let activeQuestions = [];
  let responses = [];
  let seenIndices = loadSeen(); // persisted across page reloads

  function loadSeen() {
    try {
      const raw = localStorage.getItem(SEEN_STORAGE_KEY);
      if (!raw) return new Set();
      const arr = JSON.parse(raw);
      return new Set(Array.isArray(arr) ? arr : []);
    } catch (e) {
      return new Set();
    }
  }
  function saveSeen() {
    try {
      localStorage.setItem(SEEN_STORAGE_KEY, JSON.stringify([...seenIndices]));
    } catch (e) { /* ignore */ }
  }

  // ---- Utilities ----
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function pickQuestions(count) {
    const split = STRATIFIED_PICKS[count];

    function pickFromDifficulty(diff, n) {
      // Indices of all questions of this difficulty.
      const allIdx = QUESTION_POOL
        .map((q, i) => ({ q, i }))
        .filter(x => x.q.difficulty === diff)
        .map(x => x.i);

      // Available = unseen.
      let available = allIdx.filter(i => !seenIndices.has(i));

      // If not enough unseen for this difficulty, reset just this difficulty's "seen" set.
      if (available.length < n) {
        allIdx.forEach(i => seenIndices.delete(i));
        available = allIdx.slice();
      }

      const picked = shuffle(available).slice(0, n);
      picked.forEach(i => seenIndices.add(i));
      return picked.map(i => QUESTION_POOL[i]);
    }

    const picked = [
      ...pickFromDifficulty("easy", split.easy),
      ...pickFromDifficulty("medium", split.medium),
      ...pickFromDifficulty("hard", split.hard),
    ];
    saveSeen();
    return picked;
  }

  function totalPossiblePoints(questions) {
    return questions.reduce((s, q) => s + POINTS[q.difficulty], 0);
  }

  function pickTier(pct) {
    return TIERS.find(t => pct >= t.min);
  }

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
    }[c]));
  }

  function ucfirst(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function totalForCount(count) {
    const split = STRATIFIED_PICKS[count];
    return split.easy * POINTS.easy + split.medium * POINTS.medium + split.hard * POINTS.hard;
  }

  // ---- Start screen: pick number of questions ----
  function renderCountPick() {
    chosenCount = null;
    const app = document.getElementById("app");
    app.innerHTML = `
      <header>
        <h1>Trivia Challenge</h1>
        <p>How many questions are you up for? Each round mixes easy, medium, and hard.</p>
      </header>
      <div class="pick-grid">
        <div class="pick-card" data-count="10">
          <div class="pick-num">10</div>
          <div class="pick-label">Quick Round</div>
          <div class="pick-desc">3 easy · 4 medium · 3 hard<br>${totalForCount(10)} pts total</div>
        </div>
        <div class="pick-card" data-count="20">
          <div class="pick-num">20</div>
          <div class="pick-label">Standard Round</div>
          <div class="pick-desc">6 easy · 7 medium · 7 hard<br>${totalForCount(20)} pts total</div>
        </div>
        <div class="pick-card" data-count="30">
          <div class="pick-num">30</div>
          <div class="pick-label">Full Challenge</div>
          <div class="pick-desc">9 easy · 11 medium · 10 hard<br>${totalForCount(30)} pts total</div>
        </div>
      </div>
      <div class="points-legend" style="display:flex; justify-content:center; gap:18px; margin-top:28px; flex-wrap:wrap; color:var(--muted); font-size:13px;">
        <span><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--easy); margin-right:6px;"></span>Easy = ${POINTS.easy} pts</span>
        <span><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--medium); margin-right:6px;"></span>Medium = ${POINTS.medium} pts</span>
        <span><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--hard); margin-right:6px;"></span>Hard = ${POINTS.hard} pts</span>
      </div>
    `;
    app.querySelectorAll(".pick-card").forEach(card => {
      card.addEventListener("click", () => {
        chosenCount = parseInt(card.dataset.count, 10);
        startQuiz();
      });
    });
  }

  function startQuiz() {
    activeQuestions = pickQuestions(chosenCount);
    responses = new Array(activeQuestions.length).fill(null);
    renderQuiz();
  }

  function renderQuiz() {
    const app = document.getElementById("app");
    const total = totalPossiblePoints(activeQuestions);
    app.innerHTML = `
      <header>
        <h1>Trivia Challenge</h1>
        <p>${activeQuestions.length} questions · ${total} points possible</p>
      </header>
      <div class="progress-bar">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-meta">
          <span id="answeredCount">0 / ${activeQuestions.length} answered</span>
          <span>${total} pts available</span>
        </div>
      </div>
      <div id="quiz"></div>
      <div id="warning"></div>
      <div class="actions">
        <button class="btn secondary" id="quitBtn">Back to Start</button>
        <button class="btn" id="submitBtn">Submit & See My Score</button>
      </div>
    `;

    const quiz = document.getElementById("quiz");
    activeQuestions.forEach((q, i) => {
      const card = document.createElement("div");
      card.className = "question";

      const head = document.createElement("div");
      head.className = "q-head";
      head.innerHTML = `
        <span class="q-num">Question ${i + 1}</span>
        <span class="q-meta" style="display:inline-flex; gap:8px; align-items:center;">
          <span class="q-pts" style="color: var(--${q.difficulty});">${ucfirst(q.difficulty)}</span>
          <span class="q-pts">${POINTS[q.difficulty]} pts</span>
        </span>
      `;
      card.appendChild(head);

      const text = document.createElement("p");
      text.className = "q-text";
      text.textContent = q.q;
      card.appendChild(text);

      const opts = document.createElement("div");
      opts.className = "options";
      q.options.forEach((opt, j) => {
        const id = `q${i}-opt${j}`;
        const label = document.createElement("label");
        label.className = "option";
        label.htmlFor = id;
        label.innerHTML = `
          <input type="radio" id="${id}" name="q-${i}" value="${j}" />
          <span>${escapeHTML(opt)}</span>
        `;
        label.querySelector("input").addEventListener("change", () => {
          responses[i] = j;
          opts.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
          label.classList.add("selected");
          updateProgress();
        });
        opts.appendChild(label);
      });
      card.appendChild(opts);
      quiz.appendChild(card);
    });

    document.getElementById("submitBtn").addEventListener("click", handleSubmit);
    document.getElementById("quitBtn").addEventListener("click", () => {
      if (confirm("Leave this round and go back to the start screen?")) renderCountPick();
    });
    updateProgress();
  }

  function updateProgress() {
    const answered = responses.filter(r => r !== null).length;
    const fill = document.getElementById("progressFill");
    const count = document.getElementById("answeredCount");
    if (fill) fill.style.width = `${(answered / activeQuestions.length) * 100}%`;
    if (count) count.textContent = `${answered} / ${activeQuestions.length} answered`;
  }

  function handleSubmit() {
    const answered = responses.filter(r => r !== null).length;
    const warn = document.getElementById("warning");
    if (answered < activeQuestions.length) {
      warn.innerHTML = `<div class="empty-warning">You have ${activeQuestions.length - answered} unanswered question(s). Submit anyway? <button class="btn secondary" id="confirmSubmit" style="margin-left: 10px; padding: 8px 16px; font-size: 13px;">Yes, submit</button></div>`;
      document.getElementById("confirmSubmit").addEventListener("click", showResults);
      warn.scrollIntoView({ behavior: "smooth", block: "center" });
    } else {
      showResults();
    }
  }

  function showResults() {
    const total = totalPossiblePoints(activeQuestions);
    let score = 0;
    const breakdown = {
      easy:   { correct: 0, total: 0 },
      medium: { correct: 0, total: 0 },
      hard:   { correct: 0, total: 0 },
    };
    activeQuestions.forEach((q, i) => {
      breakdown[q.difficulty].total += 1;
      if (responses[i] === q.correctIndex) {
        score += POINTS[q.difficulty];
        breakdown[q.difficulty].correct += 1;
      }
    });
    const pct = total === 0 ? 0 : score / total;
    const tier = pickTier(pct);

    const app = document.getElementById("app");
    app.innerHTML = `
      <header>
        <h1>Your Result</h1>
        <p>${activeQuestions.length}-question round</p>
      </header>
      <div class="result-card">
        <div class="breakdown">
          <div class="breakdown-item">
            <div class="breakdown-num" style="color: var(--easy);">${breakdown.easy.correct}<span class="breakdown-total">/${breakdown.easy.total}</span></div>
            <div class="breakdown-label" style="color: var(--easy);">Easy</div>
          </div>
          <div class="breakdown-item">
            <div class="breakdown-num" style="color: var(--medium);">${breakdown.medium.correct}<span class="breakdown-total">/${breakdown.medium.total}</span></div>
            <div class="breakdown-label" style="color: var(--medium);">Medium</div>
          </div>
          <div class="breakdown-item">
            <div class="breakdown-num" style="color: var(--hard);">${breakdown.hard.correct}<span class="breakdown-total">/${breakdown.hard.total}</span></div>
            <div class="breakdown-label" style="color: var(--hard);">Hard</div>
          </div>
        </div>
        <div class="score-ring">${score}<small> / ${total}</small></div>
        <div class="pct">${Math.round(pct * 100)}%</div>
        <div class="tier">${tier.label}</div>
        <p class="tier-blurb">${tier.blurb}</p>
      </div>
      <h2 style="margin: 24px 0 12px; font-size: 22px;">Review</h2>
      <div id="review"></div>
      <div class="actions" style="margin-top: 28px;">
        <button class="btn" id="newRound">Play Again (New Questions)</button>
        <button class="btn secondary" id="backStart">Choose Different Length</button>
      </div>
    `;

    const review = document.getElementById("review");
    activeQuestions.forEach((q, i) => {
      const correct = responses[i] === q.correctIndex;
      const yourIdx = responses[i];
      const yourText = yourIdx == null ? "(no answer)" : q.options[yourIdx];
      const correctText = q.options[q.correctIndex];
      const pts = POINTS[q.difficulty];
      const item = document.createElement("div");
      item.className = `review-q ${correct ? "right" : "wrong"}`;
      item.innerHTML = `
        <div class="label">
          Question ${i + 1} ·
          <span style="color: var(--${q.difficulty});">${ucfirst(q.difficulty)}</span> ·
          ${pts} pts
          <span class="badge ${correct ? "right" : "wrong"}">${correct ? `+${pts}` : "0"}</span>
        </div>
        <div style="margin-bottom: 6px;">${escapeHTML(q.q)}</div>
        <div class="your"><strong>Your answer:</strong> ${escapeHTML(yourText)}</div>
        ${correct ? "" : `<div class="correct"><strong>Correct answer:</strong> ${escapeHTML(correctText)}</div>`}
      `;
      review.appendChild(item);
    });

    document.getElementById("newRound").addEventListener("click", () => {
      // Same count + difficulty, but reshuffle the pool for fresh questions.
      startQuiz();
    });
    document.getElementById("backStart").addEventListener("click", renderCountPick);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // Boot
  renderCountPick();
</script>
</body>
</html>
